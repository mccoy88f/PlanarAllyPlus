<!DOCTYPE html>
<html lang="">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guida PlanarAlly</title>
    <link rel="stylesheet" href="../../../../static/extensions/ui.css?v=2" />
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }

        .guida-root {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
            background: #fff;
        }

        .guida-tabs {
            display: flex;
            background: #f8f9fa;
            border-bottom: 1px solid #dee2e6;
            padding: 0 10px;
            gap: 5px;
        }

        .guida-tab {
            padding: 10px 20px;
            cursor: pointer;
            border: 1px solid transparent;
            border-bottom: none;
            border-radius: 4px 4px 0 0;
            margin-bottom: -1px;
            font-size: 14px;
            color: #666;
            transition: all 0.2s;
        }

        .guida-tab:hover {
            background: #e9ecef;
        }

        .guida-tab.active {
            background: #fff;
            border-color: #dee2e6;
            color: #000;
            font-weight: 600;
        }


        .guida-content-wrap {
            flex: 1;
            min-height: 0;
            position: relative;
        }

        .guida-page {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: none;
            flex-direction: column;
        }

        .guida-page.active {
            display: flex;
        }

        .guida-iframe {
            flex: 1;
            border: none;
            width: 100%;
            height: 100%;
        }

        /* Rimosso il clipping per mostrare l'header dei docs ufficiali */
        .official-docs-container {
            flex: 1;
            position: relative;
        }

        .official-docs-iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>

<body class="ext-ui-root guida-root">
    <div class="guida-tabs" id="guidaTabs">
        <div class="guida-tab active" data-tab="system" id="tabSystem">Guida a PlanarAlly</div>
        <div class="guida-tab" data-tab="extensions" id="tabExtensions">Estensioni</div>
    </div>


    <div class="guida-content-wrap">
        <!-- Tab 1: System Guide (Official) -->
        <div id="pageSystem" class="guida-page active">
            <div class="official-docs-container">
                <iframe id="officialDocsFrame" class="official-docs-iframe" src=""
                    title="Official PlanarAlly Docs"></iframe>
            </div>
        </div>

        <!-- Tab 2: Extensions Guide (Plus) -->
        <div id="pageExtensions" class="guida-page">
            <iframe id="plusDocsFrame" class="guida-iframe" title="Documentazione Estensioni Plus"></iframe>
        </div>
    </div>

    <script>
        (function () {
            var plusDocsFrame = document.getElementById('plusDocsFrame');
            var officialDocsFrame = document.getElementById('officialDocsFrame');
            var tabs = document.querySelectorAll('.guida-tab');
            var pages = document.querySelectorAll('.guida-page');

            // URL docs: in base al locale (?locale=it|en da ExtensionModal)
            var params = new URLSearchParams(window.location.search);
            var locale = (params.get('locale') || 'it').toLowerCase().split('-')[0];

            // Labels in base al locale
            var tabSystem = document.getElementById('tabSystem');
            var tabExtensions = document.getElementById('tabExtensions');
            if (locale !== 'it') {
                tabSystem.textContent = 'Guide to PlanarAlly';
                tabExtensions.textContent = 'Extensions';
            } else {
                tabSystem.textContent = 'Guida a PlanarAlly';
                tabExtensions.textContent = 'Estensioni';
            }
            document.documentElement.lang = locale;

            var docsPath = locale === 'it' ? 'guida-docs/' : 'guida-docs-en/';
            var basePath = '';
            var pathParts = window.location.pathname.split('/api/');
            if (pathParts.length > 1) {
                basePath = pathParts[0] || '';
            }

            // System Guide path: guida-docs/docs/index.html
            var officialDocsFrame = document.getElementById('officialDocsFrame');
            officialDocsFrame.src = basePath + '/api/extensions/guida/ui/' + docsPath + 'docs/index.html';

            // Extensions Guide path: points to our new plus-features.html
            plusDocsFrame.src = basePath + '/api/extensions/guida/ui/plus-features.html?locale=' + locale;

            // Tab switching
            tabs.forEach(function (tab) {
                tab.addEventListener('click', function () {
                    var tabId = tab.getAttribute('data-tab');

                    tabs.forEach(function (t) { t.classList.remove('active'); });
                    pages.forEach(function (p) { p.classList.remove('active'); });

                    tab.classList.add('active');
                    document.getElementById('page' + tabId.charAt(0).toUpperCase() + tabId.slice(1)).classList.add('active');
                });
            });
        })();
    </script>
</body>

</html>
