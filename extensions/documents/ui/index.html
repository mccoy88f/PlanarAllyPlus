<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Documents</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="../../../../static/extensions/ui.css?v=9" />
    <script src="../../../../static/extensions/ext-bridge.js"></script>
    <style>
        html,
        body.doc-root {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        .doc-root {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .doc-content {
            flex: 1;
            min-height: 0;
            min-width: 0;
            overflow-y: auto;
            padding: 0.75rem 1.5rem 1rem;
        }

        /* Riquadro unificato: cartelle, documenti (icona/thumbnail) stesso stile e dimensioni */
        .doc-icon,
        .folder-icon,
        .doc-thumb {
            flex-shrink: 0;
            border-radius: 0.25rem;
            border: 1px solid #ddd;
            background: #f5f5f5;
            width: 2.5rem;
            height: 2.5rem;
            min-width: 2.5rem;
            min-height: 2.5rem;
        }

        .doc-icon,
        .folder-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .doc-icon .fa-solid,
        .folder-icon .fa-solid {
            font-size: 1.35rem;
            line-height: 1;
        }

        .doc-icon {
            color: #c62828;
        }

        .folder-icon {
            color: #ef6c00;
        }

        .doc-loading {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: #666;
            font-style: italic;
        }

        .doc-loading .fa-solid {
            font-style: normal;
            color: #1565c0;
        }

        .doc-empty-msg {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin: 0;
            padding: 0;
            color: #666;
            font-style: italic;
        }

        .doc-empty-msg .fa-solid {
            font-size: 1.25rem;
            font-style: normal;
            color: #999;
            flex-shrink: 0;
        }

        .doc-thumb {
            object-fit: contain;
        }

        .doc-list-item-doc {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .doc-list:not(.doc-grid) .ext-ui-list-item-content {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 0.75rem;
            min-width: 0;
        }

        .doc-list:not(.doc-grid) .ext-ui-list-item-name {
            flex: 1;
            min-width: 0;
        }

        /* Subito sotto la toolbar (come breadcrumb in CompendiumModal .qe-content-area), niente gap bianco */
        .qe-breadcrumb.doc-breadcrumb {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.75rem;
            padding: 0.5rem 1.5rem;
            margin: 0;
            width: 100%;
            box-sizing: border-box;
            background: #fafafa;
            border-bottom: 1px solid #eee;
            font-size: 0.85rem;
            color: #555;
        }

        .qe-breadcrumb .qe-breadcrumb-path {
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .qe-breadcrumb .qe-breadcrumb-sep {
            color: #999;
        }

        .qe-breadcrumb .qe-breadcrumb-item {
            text-transform: capitalize;
        }

        .qe-breadcrumb .qe-breadcrumb-link {
            background: none;
            border: none;
            padding: 0;
            margin: 0;
            cursor: pointer;
            color: #5b8ef0;
            font-size: inherit;
            font-family: inherit;
            text-transform: capitalize;
            text-decoration: none;
        }

        .qe-breadcrumb .qe-breadcrumb-link:hover {
            text-decoration: underline;
            color: #3a6fd8;
        }

        .doc-view-toggle {
            display: flex;
            gap: 2px;
            flex-shrink: 0;
        }

        .doc-view-toggle .ext-toolbar-btn {
            flex-shrink: 0;
        }

        .doc-view-toggle .ext-toolbar-btn.active {
            background: #e3f2fd;
            border-color: #2196f3;
            color: #2196f3;
        }

        .doc-list {
            width: 100%;
            min-width: 0;
        }

        /* Azioni sotto ogni elemento: solo on hover / focus (stesso pattern ui.css previsto) */
        .doc-list .ext-ui-list-item .ext-item-actions {
            opacity: 0;
            transition: opacity 0.15s ease;
            pointer-events: none;
        }

        .doc-list .ext-ui-list-item:hover .ext-item-actions,
        .doc-list .ext-ui-list-item:focus-within .ext-item-actions {
            opacity: 1;
            pointer-events: auto;
        }

        /* Azioni in lista documenti */
        .doc-list .ext-item-actions .ext-action-btn .fa-solid {
            font-size: 15px;
            line-height: 1;
        }

        .doc-list .ext-item-actions .ext-action-btn.permissions-btn {
            color: #1565c0;
        }

        .doc-list .ext-item-actions .ext-action-btn.permissions-btn:hover {
            background: rgba(21, 101, 192, 0.12);
            color: #0d47a1;
        }

        .doc-perm-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 1rem;
            box-sizing: border-box;
        }

        .doc-perm-modal {
            width: min(560px, 92vw);
            max-height: min(80vh, 720px);
            overflow: auto;
            background: #fff;
            border-radius: 0.75rem;
            box-shadow: 0 12px 36px rgba(0, 0, 0, 0.3);
            border: 1px solid #ddd;
        }

        .doc-perm-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            padding: 0.85rem 1rem;
            border-bottom: 1px solid #eee;
        }

        .doc-perm-title {
            font-weight: 700;
            font-size: 1rem;
            color: #333;
            margin: 0;
        }

        .doc-perm-body {
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .doc-perm-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .doc-perm-users {
            border: 1px solid #eee;
            border-radius: 0.5rem;
            padding: 0.6rem;
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }

        .doc-perm-add-row {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-top: 0.25rem;
            padding-top: 0.5rem;
            border-top: 1px solid #f0f0f0;
        }

        .doc-perm-modal .ext-toolbar-btn.ext-toolbar-btn-add .fa-solid {
            font-size: 16px;
            line-height: 1;
        }

        .doc-perm-user-row {
            display: grid;
            grid-template-columns: minmax(96px, 1fr) auto auto 28px;
            gap: 0.4rem 0.5rem;
            align-items: center;
        }

        .doc-perm-user-row label {
            font-size: 0.85rem;
            color: #444;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            margin: 0;
        }

        .doc-perm-user-row input[type="text"] {
            min-width: 0;
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #ddd;
            border-radius: 0.35rem;
            padding: 0.35rem 0.5rem;
        }

        .doc-perm-user-row select[data-role="name"] {
            min-width: 0;
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #ddd;
            border-radius: 0.35rem;
            padding: 0.35rem 0.45rem;
            background: #fff;
        }

        .doc-perm-user-row.doc-perm-user-row-owner {
            background: #f7fafc;
            border: 1px solid #e8eef5;
            border-radius: 0.35rem;
            padding: 0.2rem 0.35rem;
        }

        .doc-perm-owner-name {
            font-weight: 600;
            color: #2c3e50;
        }

        .doc-perm-owner-badge {
            margin-left: 0.35rem;
            font-size: 0.75rem;
            color: #607d8b;
        }

        .doc-perm-actions {
            padding: 0.8rem 1rem;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .doc-perm-empty {
            font-size: 0.9rem;
            color: #666;
            font-style: italic;
        }

        .doc-list.doc-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 0.5rem;
        }

        .doc-list.doc-grid .ext-ui-list-item {
            flex-direction: column;
            align-items: stretch;
            padding: 0.5rem;
            overflow: hidden;
        }

        .doc-list.doc-grid .ext-ui-list-item-content {
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
            min-width: 0;
            overflow: hidden;
        }

        .doc-list.doc-grid .doc-icon,
        .doc-list.doc-grid .folder-icon,
        .doc-list.doc-grid .doc-thumb {
            width: 100%;
            max-width: 120px;
            aspect-ratio: 120/165;
            min-width: 0;
            min-height: 0;
            height: auto;
            margin-bottom: 0.25rem;
            flex-shrink: 0;
        }

        .doc-list.doc-grid .doc-icon,
        .doc-list.doc-grid .folder-icon {
            font-size: 4rem;
        }

        .doc-list.doc-grid .doc-icon .fa-solid,
        .doc-list.doc-grid .folder-icon .fa-solid {
            font-size: inherit;
        }

        .doc-list.doc-grid .doc-thumb {
            object-fit: cover;
        }

        .doc-list.doc-grid .ext-ui-list-item-name {
            white-space: normal;
            word-break: break-word;
            width: 100%;
        }

        .doc-list.doc-grid .ext-item-actions {
            justify-content: center;
            margin-top: 0.25rem;
            width: 100%;
        }

        .doc-rename-input {
            width: 100%;
            max-width: 200px;
            padding: 0.2rem 0.4rem;
            font-size: 0.9rem;
        }

        /* Toolbar: icone coerenti con ui.css (32×32) */
        .ext-toolbar-bar .ext-toolbar-btn .fa-solid {
            font-size: 16px;
            line-height: 1;
        }

        .ext-toolbar-bar .ext-search-add-btn .fa-solid {
            font-size: 1.1rem;
            line-height: 1;
        }

        .doc-move-select {
            font-size: 0.85rem;
            padding: 0.2rem 0.4rem;
        }

        @media (max-width: 480px) {
            .doc-list.doc-grid {
                grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
                gap: 0.4rem;
            }

            .doc-list.doc-grid .ext-ui-list-item {
                padding: 0.35rem;
            }

            .doc-list.doc-grid .doc-icon,
            .doc-list.doc-grid .folder-icon,
            .doc-list.doc-grid .doc-thumb {
                max-width: 70px;
            }

            .doc-list.doc-grid .doc-icon,
            .doc-list.doc-grid .folder-icon {
                font-size: 2.5rem;
            }

            .qe-breadcrumb.doc-breadcrumb {
                font-size: 0.8rem;
                padding: 0.45rem 1rem;
                margin: 0;
                width: 100%;
            }
        }

        @media (min-width: 769px) {
            .doc-list.doc-grid {
                grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            }
        }

        @media (min-width: 1200px) {
            .doc-list.doc-grid {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            }
        }

        @media (min-width: 481px) and (max-width: 768px) {
            .doc-list.doc-grid {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
                gap: 0.5rem;
            }

            .doc-list.doc-grid .doc-icon,
            .doc-list.doc-grid .folder-icon,
            .doc-list.doc-grid .doc-thumb {
                max-width: 90px;
            }

            .doc-list.doc-grid .doc-icon,
            .doc-list.doc-grid .folder-icon {
                font-size: 3rem;
            }
        }
    </style>
</head>

<body class="ext-ui-root doc-root">
    <div id="uploadProgress" class="ext-progress-top-container" style="display:none">
        <div class="pa-loading-bar-wrapper">
            <div class="pa-loading-bar-track">
                <div id="uploadProgressBar" class="pa-loading-bar-fill pa-loading-bar-indeterminate"
                    style="width: 100%"></div>
            </div>
        </div>
    </div>
    <div id="topBar" class="ext-toolbar-bar doc-top-bar" style="display:none">
        <div class="ext-search-bar">
            <span class="ext-search-icon" aria-hidden="true"></span>
            <input type="text" id="docSearchInput" class="ext-search-input" placeholder="" />
            <input type="file" id="fileInput" class="ext-ui-file-input" accept=".pdf,application/pdf" multiple />
            <button type="button" id="uploadBtn" class="ext-search-add-btn" title=""></button>
        </div>
        <button type="button" id="newFolderBtn" class="ext-toolbar-btn" title=""></button>
        <div class="doc-view-toggle">
            <button type="button" id="viewListBtn" title="" class="ext-toolbar-btn active" aria-pressed="true"><i class="fa-solid fa-list" aria-hidden="true"></i></button>
            <button type="button" id="viewGridBtn" title="" class="ext-toolbar-btn" aria-pressed="false"><i class="fa-solid fa-table-cells" aria-hidden="true"></i></button>
        </div>
    </div>
    <div id="breadcrumb" class="qe-breadcrumb doc-breadcrumb" style="display:none" role="navigation" aria-label="Breadcrumb"></div>
    <div id="content" class="doc-content">
        <div id="msg"></div>
        <div id="loading" class="ext-ui-loading" style="display:none"></div>
        <div id="empty" class="ext-ui-empty" style="display:none"></div>
        <ul id="list" class="ext-ui-list doc-list" style="display:none"></ul>
    </div>
    <div id="permissionsOverlay" class="doc-perm-overlay" role="dialog" aria-modal="true" aria-labelledby="permissionsTitle">
        <div class="doc-perm-modal">
            <div class="doc-perm-header">
                <h3 id="permissionsTitle" class="doc-perm-title"></h3>
                <button type="button" id="permissionsCloseBtn" class="ext-toolbar-btn" title="Close">
                    <i class="fa-solid fa-xmark" aria-hidden="true"></i>
                </button>
            </div>
            <div class="doc-perm-body">
                <div id="permissionsDocName" class="ext-ui-muted"></div>
                <label class="doc-perm-row">
                    <input type="checkbox" id="permissionsPublicView" />
                    <span id="permissionsPublicViewLabel"></span>
                </label>
                <div class="doc-perm-users">
                    <div id="permissionsUsers" class="doc-perm-users-list"></div>
                    <div class="doc-perm-add-row">
                        <button type="button" id="permissionsAddUserBtn" class="ext-toolbar-btn ext-toolbar-btn-add" title="">
                            <i class="fa-solid fa-plus" aria-hidden="true"></i>
                        </button>
                    </div>
                </div>
            </div>
            <div class="doc-perm-actions">
                <button type="button" id="permissionsCancelBtn" class="ext-ui-btn"></button>
                <button type="button" id="permissionsSaveBtn" class="ext-ui-btn ext-ui-btn-primary"></button>
            </div>
        </div>
    </div>

                if (vars && typeof s === 'string') {
                    Object.keys(vars).forEach(function (k) {
                        var v = vars[k] != null ? String(vars[k]) : '';
                        s = s.split('{{' + k + '}}').join(v);
                    });
                }
                return s;
            }

            /** Timer a catena: ripete load(true) finché compaiono le miniature (non un solo refresh dopo 3s). */
            var thumbPollChainTimer = null;
            var thumbPollAttempts = 0;
            var THUMB_POLL_MAX = 160;
            var THUMB_POLL_MS = 400;

            function stopThumbPoll() {
                if (thumbPollChainTimer !== null) {
                    clearTimeout(thumbPollChainTimer);
                    thumbPollChainTimer = null;
                }
                thumbPollAttempts = 0;
            }

            function hasMissingDocumentThumbnails() {
                return items.some(function (it) {
                    return it.type === 'document' && it.fileHash && !it.thumbnailUrl;
                });
            }

            /**
             * Dopo generate-thumbnails il server elabora in background: aggiorniamo la lista
             * a intervalli così ogni copertina appena pronta si vede subito, senza attendere tutte.
             */
            function startThumbPoll() {
                stopThumbPoll();
                function tick() {
                    thumbPollAttempts++;
                    if (thumbPollAttempts > THUMB_POLL_MAX) {
                        stopThumbPoll();
                        return;
                    }
                    load(true)
                        .then(function () {
                            if (!hasMissingDocumentThumbnails()) {
                                stopThumbPoll();
                                return;
                            }
                            thumbPollChainTimer = setTimeout(tick, THUMB_POLL_MS);
                        })
                        .catch(function () {
                            thumbPollChainTimer = setTimeout(tick, THUMB_POLL_MS);
                        });
                }
                thumbPollChainTimer = setTimeout(tick, 250);
            }

            function buildFolderPath() {
                const map = {};
                items.forEach(function (it) { map[it.id] = it; });
                const path = [];
                let id = currentFolderId;
                while (id && id !== rootId) {
                    const it = map[id];
                    if (it) { path.unshift(it); id = it.folderId; } else break;
                }
                return path;
            }

            function renderBreadcrumb() {
                folderPath = buildFolderPath();
                if (folderPath.length === 0) {
                    breadcrumbEl.style.display = 'none';
                    breadcrumbEl.innerHTML = '';

                const path = document.createElement('div');
                path.className = 'qe-breadcrumb-path';

                rootBtn.type = 'button';
                rootBtn.className = 'qe-breadcrumb-link nav';
                rootBtn.dataset.id = String(rootId);
                rootBtn.textContent = t('documents');
                path.appendChild(rootBtn);
                folderPath.forEach(function (f, i) {
                    const sep = document.createElement('span');
                    sep.className = 'qe-breadcrumb-sep';
                    sep.textContent = ' › ';
                    path.appendChild(sep);
                    if (i < folderPath.length - 1) {
                        const btn = document.createElement('button');
                        btn.type = 'button';
                        btn.className = 'qe-breadcrumb-link nav';
                        btn.dataset.id = String(f.id);
                        btn.textContent = f.name || '';
                        path.appendChild(btn);
                    } else {
                        const cur = document.createElement('span');
                        cur.className = 'qe-breadcrumb-item';
                        cur.textContent = f.name || '';
                        path.appendChild(cur);
                    }
                });
                breadcrumbEl.innerHTML = '';
                breadcrumbEl.appendChild(path);
                breadcrumbEl.style.display = 'flex';
                breadcrumbEl.querySelectorAll('.nav').forEach(function (el) {
                    el.addEventListener('click', function () {
                        currentFolderId = parseInt(el.dataset.id, 10);
                        if (currentFolderId === rootId) currentFolderId = rootId;
                        render();
                    });
                });
            }

            function getCurrentItems() {
                var base = items.filter(function (it) {
                    const fid = it.folderId || rootId;
                    return fid === currentFolderId;
                });
                var q = (docSearchInput.value || '').trim().toLowerCase();
                if (!q) return base;
                return base.filter(function (it) { return (it.name || '').toLowerCase().indexOf(q) >= 0; });
            }

            function displayName(it) {
                var n = (it.nameKey && t(it.nameKey)) ? t(it.nameKey) : (it.name || '');
                return it.type === 'folder' ? n : n.replace(/\.[^.]+$/, '');
            }
            function renderItem(it, opts) {
                const isFolder = it.type === 'folder';
                const fullNameEsc = (it.name || '').replace(/</g, '&lt;').replace(/"/g, '&quot;');
                const displayNameEsc = displayName(it).replace(/</g, '&lt;').replace(/"/g, '&quot;');
                let iconHtml;
                if (isFolder) {
                    iconHtml = '<span class="folder-icon"><i class="fa-solid fa-folder" aria-hidden="true"></i></span>';
                } else if (it.thumbnailUrl) {
                    var thumbUrl = base() + it.thumbnailUrl;
                    iconHtml = '<img class="doc-thumb" src="' + thumbUrl + '" alt="" loading="lazy" />';
                } else {
                    iconHtml = '<span class="doc-icon"><i class="fa-solid fa-file-pdf" aria-hidden="true"></i></span>';
                }
                let actions = '';
                if (opts.permissions) {
                    actions += '<button type="button" class="ext-action-btn permissions-btn" data-id="' + it.id + '" title="' + t('permissions') + '">' + iconUsers + '</button>';

                if (opts.rename) {
                    actions += '<button type="button" class="ext-action-btn rename-btn" data-id="' + it.id + '" title="' + t('rename') + '">' + iconPen + '</button>';
                }
                if (opts.move) {
                    actions += '<button type="button" class="ext-action-btn move-btn" data-id="' + it.id + '" title="' + t('move') + '">' + iconFolderMove + '</button>';

                if (opts.delete) {
                    actions += '<button type="button" class="ext-action-btn delete del-btn" data-id="' + it.id + '" title="' + t('delete') + '">' + iconTrash + '</button>';
                }
                var contentClass = isFolder ? '' : ' doc-list-item-doc';
                return '<li class="ext-ui-list-item" data-id="' + it.id + '" data-type="' + (it.type || 'document') + '">' +
                    '<div class="ext-ui-list-item-content' + contentClass + '" data-id="' + it.id + '" data-hash="' + (it.fileHash || '') + '" data-name="' + fullNameEsc + '">' +
                    iconHtml + '<span class="ext-ui-list-item-name">' + displayNameEsc + '</span></div>' +
                    '<div class="ext-item-actions">' + actions + '</div></li>';
            }

            function render() {
                const current = getCurrentItems();
                const folders = current.filter(function (it) { return it.type === 'folder'; });
                const docs = current.filter(function (it) { return it.type === 'document'; });

                renderBreadcrumb();
                topBarEl.style.display = 'flex';
                var inSharedFolder = currentFolderId === -1;
                var allowEdit = canManageDocuments && !inSharedFolder;
                uploadBtn.style.display = allowEdit ? '' : 'none';
                newFolderBtn.style.display = allowEdit ? '' : 'none';

                if (current.length === 0) {
                    listEl.style.display = 'none';
                    setEmptyMessage('no_documents', 'fa-folder-open');
                    emptyEl.style.display = 'block';
                } else {
                    emptyEl.style.display = 'none';
                    folders.sort(function (a, b) { return (a.name || '').localeCompare(b.name || '', undefined, { sensitivity: 'base' }); });
                    docs.sort(function (a, b) { return (a.name || '').localeCompare(b.name || '', undefined, { sensitivity: 'base' }); });
                    let html = '';
                    var canEdit = function (it) { return canManageDocuments && !it.shared; };
                    var canSetPermissions = function (it) { return canManageDocuments && it.type === 'document' && !it.shared; };
                    folders.forEach(function (f) {
                        html += renderItem(f, { rename: canEdit(f), move: canEdit(f), delete: canEdit(f), permissions: false });
                    });
                    docs.forEach(function (d) {
                        html += renderItem(d, { rename: canEdit(d), move: canEdit(d), delete: canEdit(d), permissions: canSetPermissions(d) });

            function escAttr(s) {
                return String(s != null ? s : '')
                    .replace(/&/g, '&amp;')
                    .replace(/"/g, '&quot;')
                    .replace(/</g, '&lt;');
            }

            function roomQuery() {

            function selectedGrantUsers(exceptIdx) {
                if (!permissionDraft || !Array.isArray(permissionDraft.grants)) return new Set();
                var names = new Set();
                permissionDraft.grants.forEach(function (g, idx) {
                    if (idx === exceptIdx) return;
                    var n = String(g.userName || '').trim();
                    if (n) names.add(n);
                });
                return names;
            }

            async function loadRoomUsers() {
                var rq = roomQuery();
                var key = rq.roomCreator + '|' + rq.roomName;
                if (key && key === roomUsersLoadedKey && roomUsers.length > 0) return;
                roomUsersLoadedKey = key;
                roomUsers = [];
                if (!rq.roomCreator || !rq.roomName) return;
                try {
                    var url = api('/api/extensions/documents/room-users?room_creator=' + encodeURIComponent(rq.roomCreator) + '&room_name=' + encodeURIComponent(rq.roomName));
                    var response = await fetch(url, { credentials: 'include' });
                    if (!response.ok) return;
                    var payload = await response.json();
                    if (payload && Array.isArray(payload.users)) {
                        roomUsers = payload.users
                            .map(function (u) { return String(u || '').trim(); })
                            .filter(Boolean);
                    }
                } catch (e) {
                    roomUsers = [];
                }
            }

            async function ensureCurrentUser() {
                if (currentUserName) return;
                var listUrl = api('/api/extensions/documents/list');
                var params = new URLSearchParams(window.location.search);
                var rc = params.get('room_creator');
                var rn = params.get('room_name');
                if (rc && rn) {
                    listUrl += '?room_creator=' + encodeURIComponent(rc) + '&room_name=' + encodeURIComponent(rn);
                    var pp = params.get('preview_as_player');
                    if (pp) listUrl += '&preview_as_player=' + encodeURIComponent(pp);
                }
                try {
                    var r = await fetch(listUrl, { credentials: 'include' });
                    if (r.ok) {
                        var data = await r.json();
                        currentUserName = (data.currentUser || currentUserName || '').trim();
                    }
                } catch (e) { /* ignore */ }
            }

            function aclOwnerName() {

            function renderPermissionRows() {
                if (!permissionDraft || !permissionsUsersEl) return;
                var grants = permissionDraft.grants || [];
                var removeTitle = escAttr(t('remove'));
                var ownerName = aclOwnerName();
                var ownerEsc = escAttr(ownerName);
                var ownerBadgeEsc = escAttr(t('permissions_owner_badge'));
                var ownerRow = ownerName
                    ? '<div class="doc-perm-user-row doc-perm-user-row-owner">' +
                        '<div class="doc-perm-owner-name">' + ownerEsc + '<span class="doc-perm-owner-badge">' + ownerBadgeEsc + '</span></div>' +
                        '<label><input type="checkbox" checked disabled /> ' + t('can_view') + '</label>' +
                        '<label><input type="checkbox" checked disabled /> ' + t('can_edit') + '</label>' +
                        '<span></span>' +
                      '</div>'
                    : '';
                var grantsHtml = grants.length === 0
                    ? '<div class="doc-perm-empty">-</div>'
                    : grants.map(function (g, idx) {
                    var selectedName = String(g.userName || '').trim();
                    var taken = selectedGrantUsers(idx);
                    var baseOptions = roomUsers.filter(function (name) {
                        if (name === ownerName) return false;
                        return !taken.has(name) || name === selectedName;
                    });
                    if (selectedName && baseOptions.indexOf(selectedName) < 0) baseOptions.unshift(selectedName);
                    var optionsHtml = '<option value=""></option>' + baseOptions.map(function (name) {
                        var esc = escAttr(name);
                        var selected = name === selectedName ? ' selected' : '';
                        return '<option value="' + esc + '"' + selected + '>' + esc + '</option>';
                    }).join('');
                    return '<div class="doc-perm-user-row" data-idx="' + idx + '">' +
                        '<select data-role="name">' + optionsHtml + '</select>' +
                        '<label><input type="checkbox" data-role="view" ' + (g.canView ? 'checked' : '') + ' /> ' + t('can_view') + '</label>' +
                        '<label><input type="checkbox" data-role="edit" ' + (g.canEdit ? 'checked' : '') + ' /> ' + t('can_edit') + '</label>' +
                        '<button type="button" class="ext-action-btn delete" data-role="remove" title="' + removeTitle + '" aria-label="' + removeTitle + '">' + iconTrash + '</button>' +
                        '</div>';
                    }).join('');
                permissionsUsersEl.innerHTML = ownerRow + grantsHtml;

                permissionsUsersEl.querySelectorAll('.doc-perm-user-row[data-idx]').forEach(function (row) {
                    var idx = parseInt(row.dataset.idx, 10);
                    var nameInput = row.querySelector('select[data-role="name"]');
                    var viewInput = row.querySelector('input[data-role="view"]');
                    var editInput = row.querySelector('input[data-role="edit"]');
                    var removeBtn = row.querySelector('button[data-role="remove"]');
                    if (!isFinite(idx) || !permissionDraft.grants[idx] || !nameInput) return;
                    nameInput.addEventListener('change', function () {
                        permissionDraft.grants[idx].userName = String(nameInput.value || '').trim();
                        renderPermissionRows();
                    });
                    viewInput.addEventListener('change', function () {
                        permissionDraft.grants[idx].canView = !!viewInput.checked;
                        if (!viewInput.checked) permissionDraft.grants[idx].canEdit = false;
                        renderPermissionRows();
                    });
                    editInput.addEventListener('change', function () {
                        permissionDraft.grants[idx].canEdit = !!editInput.checked;
                        if (editInput.checked) permissionDraft.grants[idx].canView = true;
                        renderPermissionRows();
                    });
                    removeBtn.addEventListener('click', function () {
                        permissionDraft.grants.splice(idx, 1);
                        renderPermissionRows();
                    });
                });
            }

            async function openPermissionsModal(id) {
                var it = items.find(function (x) { return x.id === id && x.type === 'document'; });
                if (!it) return;
                activePermissionDoc = it;
                await ensureCurrentUser();
                permissionDraft = defaultAcl();
                await loadRoomUsers();

                try {
                    var response = await fetch(api('/api/extensions/resource-acl?key=' + encodeURIComponent(resourceAclKey(it.id))), {
                        credentials: 'include',
                    });
                    if (response.ok) {
                        var payload = await response.json();
                        if (payload && payload.acl) permissionDraft = payload.acl;
                    }
                } catch (e) {
                    // fallback to defaults
                }

                permissionDraft.creatorName = (currentUserName || String(permissionDraft.creatorName || '').trim() || '').trim();

                permissionsDocNameEl.textContent = it.name || '';
                permissionsPublicViewEl.checked = !!permissionDraft.publicView;
                renderPermissionRows();
                permissionsOverlayEl.style.display = 'flex';
            }

            async function savePermissions() {
                if (!activePermissionDoc || !permissionDraft) return;
                permissionDraft.publicView = !!permissionsPublicViewEl.checked;
                permissionDraft.creatorName = permissionDraft.creatorName || currentUserName || '';
                permissionDraft.grants = (permissionDraft.grants || []).map(function (g) {
                    return {
                        userName: String(g.userName || '').trim(),
                        canView: !!g.canView || !!g.canEdit,
                        canEdit: !!g.canEdit,
                    };
                }).filter(function (g) {
                    return g.userName && g.userName !== permissionDraft.creatorName;
                });

                try {
                    var response = await fetch(api('/api/extensions/resource-acl'), {
                        method: 'PUT',
                        credentials: 'include',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            key: resourceAclKey(activePermissionDoc.id),
                            acl: permissionDraft,
                        }),
                    });
                    if (response.ok) {
                        showMsg(t('save_ok'));
                        closePermissionsModal();
                    } else {
                        showMsg((await response.text()) || t('save_failed'), true);
                    }
                } catch (e) {
                    showMsg(t('save_failed'), true);
                }
            }

            async function renameItem(id) {
                const it = items.find(function (x) { return x.id === id; });
                if (!it) return;
                const name = typeof parentPrompt === 'function' ? await parentPrompt(t('new_name'), t('rename'), it.name || '') : prompt(t('new_name'), it.name || '');
                if (name == null || !name.trim()) return;
                fetch(api('/api/extensions/documents/rename'), {
                    method: 'PATCH',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: id, name: name.trim() })
                }).then(function (r) {
                    if (r.ok) { showMsg(t('renamed')); load(true); }
                    else r.text().then(function (res) { showMsg(res || t('rename_failed'), true); });
                }).catch(function () { showMsg(t('rename_failed'), true); });
            }

            function getDescendantIds(folderId) {
                const ids = [folderId];
                items.filter(function (x) { return (x.folderId || rootId) === folderId; }).forEach(function (x) {
                    if (x.type === 'folder') ids.push.apply(ids, getDescendantIds(x.id));
                });
                return ids;
            }

            async function moveItem(id) {
                const it = items.find(function (x) { return x.id === id; });
                if (!it) return;
                const excludeIds = it.type === 'folder' ? getDescendantIds(id) : [id];
                const folders = items.filter(function (x) {
                    return x.type === 'folder' && excludeIds.indexOf(x.id) < 0;
                });
                const destIds = [{ id: rootId, name: t('documents_root') }];
                folders.forEach(function (f) { destIds.push({ id: f.id, name: f.name }); });
                const choice = destIds.map(function (d, i) { return (i + 1) + '. ' + d.name; }).join('\n');
                const num = typeof parentPrompt === 'function' ? await parentPrompt(t('move_to_folder') + '\n\n' + choice, t('move'), '1') : prompt(t('move_to_folder') + '\n\n' + choice);
                if (num == null || num === '') return;
                const idx = parseInt(num, 10);
                if (isNaN(idx) || idx < 1 || idx > destIds.length) return;
                const destId = destIds[idx - 1].id;
                if (destId === (it.folderId || rootId)) return;
                fetch(api('/api/extensions/documents/move'), {
                    method: 'PATCH',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: id, parentId: destId })
                }).then(function (r) {
                    if (r.ok) { showMsg(t('moved')); load(true); }
                    else r.text().then(function (res) { showMsg(res || t('move_failed'), true); });
                }).catch(function () { showMsg(t('move_failed'), true); });
            }

            /**
             * @param {boolean} [silent] Se true: aggiorna i dati in background senza svuotare la vista
             *  (liste, breadcrumb, toolbar restano visibili). Usato dopo miniature, upload, ecc.
             *  Il caricamento a schermo intero resta solo al primo load.
             */
            async function load(silent) {
                if (!silent) {
                    stopThumbPoll();
                    setLoadingVisible(true);
                    emptyEl.style.display = 'none';
                    listEl.style.display = 'none';
                    breadcrumbEl.style.display = 'none';
                    topBarEl.style.display = 'none';
                }
                try {
                    var listUrl = api('/api/extensions/documents/list');
                    var params = new URLSearchParams(window.location.search);
                    var rc = params.get('room_creator');
                    var rn = params.get('room_name');
                    if (rc && rn) {
                        listUrl += '?room_creator=' + encodeURIComponent(rc) + '&room_name=' + encodeURIComponent(rn);
                        var pp = params.get('preview_as_player');
                        if (pp) listUrl += '&preview_as_player=' + encodeURIComponent(pp);
                    }
                    const r = await fetch(listUrl, { credentials: 'include' });
                    if (!r.ok) {
                        setLoadingVisible(false);
                        if (silent) {
                            showMsg(t('error_loading'), true);
                            return;
                        }
                    }
                    const data = r.ok ? await r.json() : { documents: [], rootId: null };
                    items = data.documents || [];
                    rootId = data.rootId;
                    canManageDocuments = data.canManageDocuments !== false;
                    currentUserName = (data.currentUser || currentUserName || '').trim();
                    items.forEach(function (it) {
                        if (it.type === 'document' && it.fileHash && it.thumbnailUrl) {
                            thumbGenRequested.delete(it.fileHash);
                        }
                    });
                    if (currentFolderId === null || !items.some(function (it) { return it.id === currentFolderId || (it.type === 'folder' && it.folderId === currentFolderId); })) {
                        currentFolderId = rootId;
                    }
                    setLoadingVisible(false);
                    render();
                    var missingThumbs = canManageDocuments
                        ? items.filter(function (it) {
                            return it.type === 'document' && it.fileHash && !it.thumbnailUrl && !thumbGenRequested.has(it.fileHash);
                        }).map(function (it) { return it.fileHash; })
                        : [];
                    if (missingThumbs.length > 0) {
                        try {
                            var genR = await fetch(api('/api/extensions/documents/generate-thumbnails'), {
                                method: 'POST',
                                credentials: 'include',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ fileHashes: missingThumbs })
                            });
                            if (genR.ok) {
                                var genData = await genR.json();
                                missingThumbs.forEach(function (h) { thumbGenRequested.add(h); });
                                if (genData.generated > 0 || hasMissingDocumentThumbnails()) {
                                    startThumbPoll();
                                }
                            }
                        } catch (e) { /* ignore */ }
                    }
                } catch (e) {
                    setLoadingVisible(false);
                    if (silent) {
                        showMsg(t('error_loading'), true);
                    } else {
                        setEmptyMessage('error_loading', 'fa-triangle-exclamation');
                        emptyEl.style.display = 'block';
                    }
                }
            }

            async function deleteDoc(id) {
                const it = items.find(function (x) { return x.id === id; });
                if (!it) return;
                const ok = typeof parentConfirm === 'function' ? await parentConfirm(t('delete'), t('delete_confirm', { name: it.name || '' })) : confirm(t('delete_confirm', { name: it.name || '' }));
                if (!ok) return;
                try {
                    const r = await fetch(api('/api/extensions/documents/delete'), {
                        method: 'POST',
                        credentials: 'include',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ id: id })
                    });
                    if (r.ok) {
                        showMsg(t('deleted'));
                        load(true);
                    } else {
                        showMsg(await r.text() || t('delete_failed'), true);
                    }
                } catch (e) {
                    showMsg(t('delete_failed'), true);
                }
            }

            newFolderBtn.addEventListener('click', async function () {
                if (!canManageDocuments) return;
                const name = typeof parentPrompt === 'function' ? await parentPrompt(t('folder_name'), t('new_folder'), '') : prompt(t('folder_name'));
                if (!name || !name.trim()) return;
                fetch(api('/api/extensions/documents/folder'), {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: name.trim(), parentId: currentFolderId })
                }).then(function (r) {
                    if (r.ok) { showMsg(t('folder_created')); load(true); }
                    else r.text().then(function (res) { showMsg(res || t('failed'), true); });
                }).catch(function () { showMsg(t('failed'), true); });
            });

            fileInput.addEventListener('change', async function () {
                if (!canManageDocuments) return;
                const files = fileInput.files;
                if (!files || files.length === 0) return;
                const pdfs = Array.prototype.filter.call(files, function (f) { return f.name.toLowerCase().endsWith('.pdf'); });
                if (pdfs.length === 0) return;
                const progressEl = document.getElementById('uploadProgress');
                progressEl.style.display = 'block';
                uploadBtn.disabled = true;
                var okCount = 0;
                var errCount = 0;
                try {
                    for (var i = 0; i < pdfs.length; i++) {
                        var file = pdfs[i];
                        var fd = new FormData();
                        fd.append('file', file);
                        if (rootId) {
                            fd.append('parentId', String(currentFolderId || rootId));
                        }
                        var r = await fetch(api('/api/extensions/documents/upload'), {
                            method: 'POST',
                            credentials: 'include',
                            body: fd
                        });
                        if (r.ok) {
                            okCount++;
                        } else {
                            errCount++;
                        }
                    }
                    if (okCount > 0) {
                        showMsg(okCount === 1 ? t('document_uploaded') : (okCount + ' ' + t('documents_uploaded_count')));
                        load(true);
                    }
                    if (errCount > 0) {
                        showMsg((errCount === pdfs.length ? '' : okCount + ' ok. ') + t('upload_failed'), true);
                    }
                } catch (e) {
                    showMsg(t('upload_failed'), true);
                } finally {
                    uploadBtn.disabled = false;
                    fileInput.value = '';
                    document.getElementById('uploadProgress').style.display = 'none';
                }
            });

            uploadBtn.addEventListener('click', function () {
                if (!canManageDocuments) return;
                fileInput.click();
            });
            docSearchInput.addEventListener('input', function () { render(); });
            permissionsOverlayEl.addEventListener('click', function (event) {
                if (event.target === permissionsOverlayEl) closePermissionsModal();
            });
            permissionsCloseBtn.addEventListener('click', closePermissionsModal);
            permissionsCancelBtn.addEventListener('click', closePermissionsModal);
            permissionsAddUserBtn.addEventListener('click', function () {
                if (!permissionDraft) return;
                var taken = selectedGrantUsers(-1);
                var ownerName = aclOwnerName();
                var suggested = roomUsers.find(function (name) { return name !== ownerName && !taken.has(name); }) || '';
                permissionDraft.grants.push({ userName: suggested, canView: true, canEdit: false });
                renderPermissionRows();
            });
            permissionsPublicViewEl.addEventListener('change', function () {
                if (!permissionDraft) return;
                permissionDraft.publicView = !!permissionsPublicViewEl.checked;
            });
            permissionsSaveBtn.addEventListener('click', savePermissions);

            load();
        })();
    </script>
</body>

</html>
