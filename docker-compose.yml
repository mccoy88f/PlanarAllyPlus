# Build: clona da GitHub (branch PA_GIT_REF). Se npm ci fallisce: 1) verifica che
# client/package-lock.json sia committato sul branch remoto; 2) docker compose build --no-cache;
# 3) controlla RAM host / log completo build (spesso OOM o rete verso registry.npmjs.org).
services:
  planarally:
    container_name: planarally
    build:
      context: .
      dockerfile: Dockerfile
      # Allinea al branch che usi su GitHub (dev = build con ultimo codice; main quando è allineato)
      args:
        PA_GIT_REF: dev
    restart: unless-stopped
    user: "9000"
    environment:
      - PA_BASEPATH=/
      - PA_ADMIN_USER=admin
    ports:
      - "8001:8000"
    volumes:
      - planarally_assets:/planarally/static/assets
      - planarally_data:/planarally/data
      - planarally_temp:/planarally/static/temp
    networks:
      - planarally-net

volumes:
  planarally_assets:
  planarally_data:
  planarally_temp:

networks:
  planarally-net:
    driver: bridge
